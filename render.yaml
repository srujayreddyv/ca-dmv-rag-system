# Render Blueprint: CA DMV RAG API
# Deploy from GitHub/GitLab/Bitbucket. Set env vars in Dashboard (OPENAI_API_KEY, etc.).
# See docs/DEPLOY.md for full steps.
# Uses Dockerfile: build runs in container; index is built at image build time.

services:
  - type: web
    name: ca-dmv-rag-api
    runtime: docker
    region: oregon

    # Render runs: docker build, then docker run. Dockerfile CMD runs uvicorn on 8000;
    # Render injects PORT; use that in the Dockerfile or set dockerfilePath and a start command.
    dockerfilePath: ./Dockerfile
    dockerContext: .

    envVars:
      # Render sets PORT automatically for Docker. Add OPENAI_API_KEY, OPENAI_BASE_URL, LLM_MODEL in Dashboard.
    # Optional: enable rate limiting when public (e.g. 60 requests per 60s per IP)
    # RATE_LIMIT_REQUESTS=60
    # RATE_LIMIT_WINDOW_SECONDS=60
