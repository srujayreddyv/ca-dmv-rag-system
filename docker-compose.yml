# CA DMV RAG: API + Streamlit. Requires data/ (chunks + index) and .env.
# Build:  docker compose build
# Run:    docker compose up
# Then:   API http://localhost:8000  |  Streamlit http://localhost:8501
#
# First time: on host run  python scripts/build_chunks.py  and  python scripts/build_index.py
# so data/processed/chunks.jsonl and data/embeddings/ exist (or mount your own data).

services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    restart: unless-stopped

  streamlit:
    build: .
    command: streamlit run streamlit_app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
    environment:
      API_URL: http://api:8000
    env_file:
      - .env
    depends_on:
      - api
    restart: unless-stopped
